image: gitpod/workspace-bun

vscode:
  extensions:
    - astro-build.astro-vscode
    - sourcegraph.cody-ai
    - bradlc.vscode-tailwindcss
    - mhutchie.git-graph
    - github.vscode-github-actions
    - astro-build.houston

tasks:
  - init: |
      bun i --frozen-lockfile
      cp .env.example .env
